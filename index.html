<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laitila App Legal</title>
    <meta
      name="description"
      content="Public legal pages for Laitila App."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faf8;
        --paper: #ffffff;
        --text: #13201c;
        --muted: #596a64;
        --border: #dce8e2;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.65;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      article {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: clamp(24px, 5vw, 44px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 3rem);
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
      }

      nav {
        display: grid;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }

      .link-card {
        display: block;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        background: #fbfdfc;
        text-decoration: none;
      }

      .link-card span {
        display: block;
        color: var(--muted);
        font-weight: 400;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <h1>Laitila App Legal</h1>
        <p>
          Public legal pages for Laitila App. These pages use no tracking, no
          backend, and no cookies.
        </p>

        <nav aria-label="Legal pages">
          <a class="link-card" href="./privacy.html">
            Privacy Policy
            <span>How Laitila App handles app data and user submissions.</span>
          </a>
          <a class="link-card" href="./terms.html">
            Terms
            <span>Basic terms for using Laitila App.</span>
          </a>
        </nav>
      </article>
    </main>
  </body>
</html>
